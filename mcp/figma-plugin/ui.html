<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: Inter, system-ui, sans-serif;
        font-size: 12px;
        padding: 8px;
        color: #333;
        margin: 0;
      }
      #status {
        padding: 4px 8px;
        border-radius: 4px;
        background: #f5f5f5;
      }
      .connected { color: #0a0; }
      .disconnected { color: #a00; }
    </style>
  </head>
  <body>
    <div id="status" class="disconnected">Connecting to MCP server...</div>
    <script>
      const WS_URL = "ws://localhost:3055";
      let ws = null;
      let reconnectTimer = null;
      const statusEl = document.getElementById("status");

      function connect() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          statusEl.textContent = "Connected to MCP server";
          statusEl.className = "connected";
          if (reconnectTimer) {
            clearInterval(reconnectTimer);
            reconnectTimer = null;
          }
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            // Forward command from MCP server to plugin sandbox
            parent.postMessage({ pluginMessage: msg }, "*");
          } catch (e) {
            console.error("Failed to parse WS message:", e);
          }
        };

        ws.onclose = () => {
          statusEl.textContent = "Disconnected — reconnecting...";
          statusEl.className = "disconnected";
          ws = null;
          if (!reconnectTimer) {
            reconnectTimer = setInterval(connect, 3000);
          }
        };

        ws.onerror = () => {
          // onclose will fire after this
        };
      }

      // Receive results from plugin sandbox and forward to MCP server
      window.onmessage = (event) => {
        const msg = event.data?.pluginMessage;
        if (!msg || !msg.id) return;
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify(msg));
        }
      };

      connect();
    </script>
  </body>
</html>
